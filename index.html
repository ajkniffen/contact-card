<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Kniffen | Markus Alliance</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .card { 
            background-color: #1e293b; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); 
            text-align: center; 
            max-width: 400px; 
            width: 100%; 
            border: 1px solid #334155; 
        }
        h1 { 
            margin: 0 0 5px 0; 
            font-size: 32px; 
            color: #ffffff; 
        }
        p { 
            margin: 0 0 20px 0; 
            color: #94a3b8; 
            font-size: 18px; 
        }
        .logo { 
            max-width: 160px; 
            height: auto; 
            margin: 0 auto 25px auto; 
            display: block; 
            border-radius: 8px;
        }
        .btn { 
            display: block; 
            background-color: #3b82f6; 
            color: white; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            transition: background 0.2s; 
        }
        .btn:hover { 
            background-color: #2563eb; 
        }
        .links a { 
            color: #60a5fa; 
            text-decoration: none; 
            margin: 0 15px; 
            font-size: 16px; 
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Tony Kniffen</h1>
               
        <img src="MALogo.jpg" alt="Markus Alliance Logo" class="logo">

        <a href="Tony Kniffen.vcf" class="btn">Save Contact to Phone</a>
        
        <div class="links">
            <a href="https://markusalliance.com" target="_blank">Website</a>
            <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
        </div>
    </div>
</body>
</html>
