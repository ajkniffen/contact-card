<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Kniffen | Markus Alliance</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #0b1324; 
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 24px; 
        }
        .card { 
            background: #152033; 
            padding: 48px 36px; 
            border-radius: 16px; 
            border: 1px solid #223352;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4); 
            text-align: center; 
            max-width: 380px; 
            width: 100%; 
        }
        .logo-container {
            background-color: #ffffff;
            padding: 14px 24px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 28px;
        }
        .logo { 
            max-width: 160px; 
            height: auto; 
            display: block; 
        }
        h1 { 
            font-size: 26px; 
            font-weight: 600;
            color: #ffffff; 
            letter-spacing: -0.3px;
            margin-bottom: 16px;
        }
        .btn { 
            display: block;
            background-color: #1e2e4a; 
            color: #ffffff; 
            text-decoration: none; 
            padding: 14px 20px; 
            border-radius: 8px; 
            font-weight: 500; 
            font-size: 15px;
            margin-bottom: 24px; 
            border: 1px solid #2d436b;
            transition: all 0.2s ease-in-out; 
        }
        .btn:hover { 
            background-color: #24375a;
            border-color: #dc2626; /* Subtle brand red accent on hover */
            color: #ffffff;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 24px;
        }
        .links a { 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 400;
            letter-spacing: 0.2px;
            transition: color 0.2s ease;
        }
        .links a:hover {
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="MALogo.jpg" alt="Markus Alliance Logo" class="logo">
        </div>

        <h1>Tony Kniffen</h1>

        <a href="Tony Kniffen.vcf" class="btn">Save Contact to Phone</a>
        
        <div class="links">
            <a href="https://markusalliance.com" target="_blank">Website</a>
            <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
        </div>
    </div>
</body>
</html>
