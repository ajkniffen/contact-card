<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Kniffen | Markus Alliance</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f172a; 
            color: #111827; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .card { 
            background-color: #ffffff; 
            padding: 40px 32px; 
            border-radius: 16px; 
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4); 
            text-align: center; 
            max-width: 360px; 
            width: 100%; 
        }
        h1 { 
            font-size: 28px; 
            font-weight: 700;
            color: #000000; 
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        .logo { 
            max-width: 160px; 
            height: auto; 
            margin: 0 auto 28px auto; 
            display: block; 
        }
        .btn { 
            display: inline-block;
            background-color: #0f172a; 
            color: #ffffff; 
            text-decoration: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px;
            margin-bottom: 24px; 
            transition: background-color 0.2s ease;
        }
        .btn:hover { 
            background-color: #1e293b; 
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .links a { 
            color: #000000; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500;
            transition: opacity 0.2s ease;
        }
        .links a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Tony Kniffen</h1>
        
        <img src="MALogo.jpg" alt="Markus Alliance Logo" class="logo">

        <a href="Tony Kniffen.vcf" class="btn">Save Contact to Phone</a>
        
        <div class="links">
            <a href="https://markusalliance.com" target="_blank">Website</a>
            <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
        </div>
    </div>
</body>
</html>
