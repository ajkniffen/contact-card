<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony Kniffen | Markus Alliance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  a { text-decoration: none; }
  .card {
    background-color: #ffffff;
    border-radius: 18px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    text-align: center;
    max-width: 380px;
    width: 100%;
    overflow: hidden;
  }
  .accent-bar { height: 5px; width: 100%; background-color: #c10001; }
  .card-body { padding: 24px 32px 36px; }
  .logo { max-width: 150px; height: auto; margin: 20px auto 0 auto; display: block; }
  h1 { font-size: 28px; font-weight: 800; color: #111827; letter-spacing: -0.5px; margin-bottom: 8px; }
  .title-line {
    font-size: 13px;
    font-weight: 500;
    color: #6b7280;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 52px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    transition: filter 0.15s ease, background-color 0.15s ease;
  }
  .btn-primary { background-color: #c10001; color: #ffffff; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-secondary {
    background-color: #ffffff;
    color: #111827;
    font-weight: 600;
    border: 1.5px solid rgba(17, 24, 39, 0.85);
  }
  .btn-secondary:hover { background-color: #f0f0f0; }
  .trust {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(17, 24, 39, 0.08);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 11px;
    color: #111827;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="card-body">
      <h1>Tony Kniffen</h1>
      <div class="title-line">CEO · Markus Alliance Inc.</div>
      <img src="MALogo.jpg" alt="Markus Alliance Logo" class="logo">
      <div class="btn-group">
        <a href="Tony Kniffen.vcf" class="btn btn-primary" download>Download Contact Card</a>
        <a href="https://www.linkedin.com/in/tonykniffen" target="_blank" rel="noopener" class="btn btn-secondary">LinkedIn Profile</a>
        <a href="https://markusalliance.com" target="_blank" rel="noopener" class="btn btn-secondary">Company Website</a>
      </div>
      <div class="trust">
        served from markusalliance.com<br>
        no tracking, no forms
      </div>
    </div>
  </div>
</body>
</html>
